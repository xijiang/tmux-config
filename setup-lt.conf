# ============================================
# Initial session setup configuration for machine: lt
# Creates 2 windows: main and alt
# ============================================

# Window 0: main (home directory)
split-window -h -c '~'
select-pane -t 0

# Window 1: alt
new-window -n 'alt' -c '~'
split-window -h -c '~'
select-pane -t 0

# Return to the first window
select-window -t 0
