# ============================================
# Initial session setup configuration for machine: wsl
# Creates 2 windows: main and alt
# ============================================

# Rename the default window to 'main'
rename-window 'main'

# Window 0: main (home directory)
split-window -h -c '~'
select-pane -t 0

# Window 1: alt
new-window -n 'alt' -c '~'
split-window -h -c '~'
select-pane -t 0

# Return to the first window (main)
select-window -t 0
