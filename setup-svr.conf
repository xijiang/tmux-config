# ============================================
# Initial session setup configuration for machine: svr
# Creates 2 windows: main and alt
# ============================================

# Window 1: main (home directory)
# First window is already named 'main' by the manager script
split-window -h -c '~'
split-window -h -c '~'
select-layout even-horizontal
select-pane -t 1

# Window 2: alt
new-window -n 'alt' -c '~'
split-window -h -c '~'
split-window -h -c '~'
select-layout even-horizontal
select-pane -t 1

# Return to the first window (main)
select-window -t 1
