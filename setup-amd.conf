# ============================================
# Initial session setup configuration for machine: amd
# Creates 3 windows: status, main, and alt
# ============================================

# Window 1: status (home directory)
split-window -h -c '~'
split-window -h -c '~'
select-layout even-horizontal
select-pane -t 1

# Window 2: main
new-window -n 'main' -c '~'
split-window -h -c '~'
split-window -h -c '~'
select-layout even-horizontal
select-pane -t 1

# Window 3: alt
new-window -n 'alt' -c '~'
split-window -h -c '~'
split-window -h -c '~'
select-layout even-horizontal
select-pane -t 1

# Return to the first window
select-window -t 1
