# ============================================
# Initial session setup configuration for machine: amd
# Creates 3 windows: status, main, and alt
# ============================================

# Window 0: status (home directory)
split-window -h -c '~'
select-pane -t 0

# Window 1: main
new-window -n 'main' -c '~'
split-window -h -c '~'
select-pane -t 0

# Window 2: alt
new-window -n 'alt' -c '~'
split-window -h -c '~'
select-pane -t 0

# Return to the first window
select-window -t 0
