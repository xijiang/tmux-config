# ============================================
# Enhanced tmux configuration with session management
# ============================================

# Basic settings
set -g default-terminal "screen-256color"
set -g mouse on
set -g history-limit 10000
set -g escape-time 0

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Session management - automatically attach to existing session or create new one

# Window and pane navigation
# Switch panes using Alt-arrow without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift-arrow
bind -n S-Left  previous-window
bind -n S-Right next-window

# Split panes with more intuitive keys
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Layout management
# Note: Alt-1 through Alt-5 are often captured by terminal emulators (e.g. GNOME Terminal)
# You can disable those shortcuts in your terminal settings, or use these alternatives:
bind h select-layout even-horizontal
bind v select-layout even-vertical

# Reload config with r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Status bar configuration
set -g status-bg black
set -g status-fg white
set -g status-left '[#S] '
set -g status-right '%Y-%m-%d %H:%M'
set -g status-left-length 20
set -g status-right-length 40

# Window status format
setw -g window-status-current-style 'fg=black bg=white bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=white'
setw -g window-status-format ' #I:#W '

# ============================================
# Emacs-style keybindings and clipboard integration
# ============================================

# Use Emacs keybindings in copy mode
setw -g mode-keys emacs

# Enable OSC 52 for system clipboard integration (works over SSH)
set -s set-clipboard on

# Pass through xterm keys (Ctrl+Arrows, etc.) for better Emacs support
setw -g xterm-keys on

# Emacs-like selection and yanking in copy mode
# Press C-b, [ to enter copy mode
# Use C-space to start selection (like set-mark-command)
bind-key -T copy-mode-emacs C-space send-keys -X begin-selection
# Use M-w to copy (like kill-ring-save)
bind-key -T copy-mode-emacs M-w     send-keys -X copy-pipe-and-cancel

# Ensure mouse dragging also hits the system clipboard via OSC 52
bind-key -T copy-mode-emacs MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# ============================================
# Initial session setup (Hostname-aware)
# ============================================

# Use current hostname (lower case) to identify the machine
run-shell "tmux set-environment -g MACHINE $(hostname | cut -d. -f1 | tr '[:upper:]' '[:lower:]')"
